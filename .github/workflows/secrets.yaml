name: SECURITY

on:
  merge_group:
  pull_request:
  push:
    branches:
      - main

jobs:
  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: scan source
        id: trufflehog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: '${{ github.event.repository.default_branch }}'
          head: HEAD
          extra_args: --debug
      - name: evaluate results
        if: steps.trufflehog.outcome == 'failure'
        run: exit 1
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: scan source
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
